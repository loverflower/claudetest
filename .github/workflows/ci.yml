name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # Using `npm install` instead of `npm ci` because the lockfile is
        # generated on Windows and contains platform-specific optional deps
        # (e.g. @emnapi/core) that npm ci on Linux flags as out-of-sync.
        # Known npm bug: https://github.com/npm/cli/issues/4828
        # For a learning project, the determinism trade-off is acceptable.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
